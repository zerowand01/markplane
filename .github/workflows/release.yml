name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version = "\(.*\)"/\1/p;}' Cargo.toml)
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build frontend
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: crates/markplane-web/ui/.nvmrc
          cache: npm
          cache-dependency-path: crates/markplane-web/ui/package-lock.json

      - name: Build
        working-directory: crates/markplane-web/ui
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: crates/markplane-web/ui/out/
          retention-days: 1

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [validate, build-frontend]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.0'
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: crates/markplane-web/ui/out/

      - name: Build
        run: cargo build --locked --release --features embed-ui --target ${{ matrix.target }}

      - name: Smoke test
        run: ./target/${{ matrix.target }}/release/markplane --version
        if: runner.os != 'Windows'

      - name: Smoke test (Windows)
        run: .\target\${{ matrix.target }}\release\markplane.exe --version
        if: runner.os == 'Windows'

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="markplane-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/${{ matrix.target }}/release markplane
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "markplane-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/markplane.exe" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  create-release:
    name: Create release
    needs: [validate, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum markplane-v* > checksums-sha256.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            markplane-v*
            checksums-sha256.txt
            install.sh
